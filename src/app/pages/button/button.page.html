<ion-content style="--background: #f4f5f8; padding-top: 10px;">
  
  <div style="padding: 10px 16px;">

    <ion-card style="margin-bottom: 12px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; background: #fff;">
      <ion-toolbar style="--background: #fff; --border-style: none; --min-height: 48px;">
        <ion-buttons slot="start">
          <ion-button color="primary">Favorite</ion-button>
        </ion-buttons>
        <ion-title style="color: #000; font-size: 16px; font-weight: 600;" class="ion-text-center">Default Buttons</ion-title>
        <ion-buttons slot="end">
          <ion-button color="primary">Delete</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-card>

    <ion-card style="margin-bottom: 12px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; background: #fff;">
      <ion-toolbar style="--background: #fff; --border-style: none; --min-height: 48px;">
        <ion-buttons slot="start">
          <ion-button>
            <ion-icon slot="icon-only" name="person-circle" color="primary"></ion-icon>
          </ion-button>
          <ion-button>
            <ion-icon slot="icon-only" name="search" color="primary"></ion-icon>
          </ion-button>
        </ion-buttons>
        <ion-title style="color: #000; font-size: 16px; font-weight: 600;" class="ion-text-center">Icon Buttons</ion-title>
        <ion-buttons slot="end">
          <ion-button>
            <ion-icon slot="icon-only" name="ellipsis-horizontal" color="primary"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-card>

    <ion-card style="margin-bottom: 12px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; background: #fff;">
      <ion-toolbar style="--background: #fff; --border-style: none; --min-height: 48px;">
        <ion-buttons slot="start">
          <ion-button fill="solid" color="primary">
            <ion-icon slot="start" name="person-circle"></ion-icon>
            Contact
          </ion-button>
        </ion-buttons>
        <ion-title style="color: #000; font-size: 16px; font-weight: 600;" class="ion-text-center">Solid Buttons</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="solid" color="primary">
            Help
            <ion-icon slot="end" name="help-circle"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-card>

    <ion-card style="margin-bottom: 12px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; background: #fff;">
      <ion-toolbar style="--background: #fff; --border-style: none; --min-height: 48px;">
        <ion-buttons slot="start">
          <ion-button fill="outline" color="primary">
            <ion-icon slot="start" name="star"></ion-icon>
            Star
          </ion-button>
        </ion-buttons>
        <ion-title style="color: #000; font-size: 16px; font-weight: 600;" class="ion-text-center">Outline Buttons</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="outline" color="primary">
            Edit
            <ion-icon slot="end" name="create"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-card>

    <ion-card style="margin-bottom: 12px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; background: #fff;">
      <ion-toolbar style="--background: #fff; --border-style: none; --min-height: 48px;">
        <ion-buttons slot="start">
          <ion-back-button defaultHref="/inicio" text="Back" color="primary"></ion-back-button>
        </ion-buttons>
        <ion-title style="color: #000; font-size: 16px; font-weight: 600;" class="ion-text-center">Back Button</ion-title>
      </ion-toolbar>
    </ion-card>

    <ion-card style="margin-bottom: 12px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; background: #fff;">
      <ion-toolbar style="--background: #fff; --border-style: none; --min-height: 48px;">
        <ion-buttons slot="start">
          <ion-menu-button color="primary" auto-hide="false"></ion-menu-button>
        </ion-buttons>
        <ion-title style="color: #000; font-size: 16px; font-weight: 600;" class="ion-text-center">Menu Button</ion-title>
      </ion-toolbar>
    </ion-card>

  </div>

</ion-content>
