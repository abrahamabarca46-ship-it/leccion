<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Formulario de Reserva de Hotel</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="reservaForm" (ngSubmit)="registrarReserva()">
    
    <ion-item class="ion-margin-bottom">
      <ion-input 
        label="Nombre del cliente" 
        labelPlacement="floating" 
        type="text" 
        formControlName="nombreCliente">
      </ion-input>
    </ion-item>

    <ion-item class="ion-margin-bottom">
      <ion-input 
        label="Fecha de ingreso" 
        labelPlacement="floating" 
        type="date" 
        [min]="fechaMinima" 
        formControlName="fechaIngreso">
      </ion-input>
    </ion-item>
    <div *ngIf="reservaForm.get('fechaIngreso')?.touched && reservaForm.get('fechaIngreso')?.hasError('fechaInvalida')">
      <ion-note color="danger" class="ion-padding-start">La fecha no puede ser menor a la fecha actual.</ion-note>
    </div>

    <ion-item class="ion-margin-bottom">
      <ion-input 
        label="Número de noches" 
        labelPlacement="floating" 
        type="number" 
        formControlName="numeroNoches">
      </ion-input>
    </ion-item>
    <div *ngIf="reservaForm.get('numeroNoches')?.touched && reservaForm.get('numeroNoches')?.hasError('min')">
      <ion-note color="danger" class="ion-padding-start">El número de noches debe ser mayor a 0.</ion-note>
    </div>

    <ion-item class="ion-margin-bottom">
      <ion-input 
        label="Número de habitación" 
        labelPlacement="floating" 
        type="text" 
        maxlength="3" 
        formControlName="numeroHabitacion">
      </ion-input>
    </ion-item>
    <div *ngIf="reservaForm.get('numeroHabitacion')?.touched && reservaForm.get('numeroHabitacion')?.hasError('pattern')">
      <ion-note color="danger" class="ion-padding-start">Debe contener exactamente 3 dígitos numéricos.</ion-note>
    </div>

    <div class="ion-padding-top">
      <ion-button 
        type="submit" 
        expand="block" 
        [disabled]="reservaForm.invalid">
        Reservar
      </ion-button>
    </div>

  </form>
</ion-content>
